spring.application.name=local-resolve

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://mysql-3e503883-shivanarayanan9840-08bc.a.aivencloud.com:26764/defaultdb?ssl-mode=REQUIRED}
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT Configuration
jwt.secret=localResolveSecretKeyForJWTTokenGenerationMustBe256BitsLong123456
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.localresolve=DEBUG
logging.level.org.springframework.security=DEBUG
